name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: logica
          POSTGRES_PASSWORD: logica
          POSTGRES_DB: logica_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U logica"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      LOGICA_DATABASE_URL: postgres://logica:logica@localhost:5432/logica_test?sslmode=disable
      LOGICA_JWT_SECRET: test-secret-test-secret-test-secret-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Build
        run: |
          go build ./cmd/api
          go build ./cmd/worker
          go build ./cmd/logica
      - name: Apply migrations
        run: go run ./cmd/logica migrate up
      - name: Test
        run: go test ./... -race -count=1
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
